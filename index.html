<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helios.Virtual</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#070708;
      --panel:#0b0b0d;
      --panel2:#0f0f12;
      --border:rgba(255,255,255,.10);
      --border2:rgba(255,255,255,.14);
      --text:#f4f4f5;
      --muted:rgba(244,244,245,.72);
      --muted2:rgba(244,244,245,.55);
      --shadow: 0 20px 60px rgba(0,0,0,.45);
      --radius: 22px;
      --radius2: 28px;
      --max: 1180px;
      --hdrH: 72px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 70% -10%, rgba(255,255,255,.08), transparent 55%),
                  radial-gradient(900px 500px at 10% 0%, rgba(255,255,255,.06), transparent 50%),
                  var(--bg);
      color:var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      scroll-behavior:smooth;
    }

    a{color:inherit; text-decoration:none}
    button{font-family:inherit}

    .container{max-width:var(--max); margin:0 auto; padding:0 18px}
    .section{padding:84px 0}
    .section.alt{background: rgba(255,255,255,.03); border-top:1px solid var(--border); border-bottom:1px solid var(--border)}
    .kicker{letter-spacing:.22em; font-size:11px; font-weight:700; color:rgba(244,244,245,.55)}
    h1{margin:14px 0 0; font-size:46px; line-height:1.06; letter-spacing:-.03em}
    h2{margin:0; font-size:34px; letter-spacing:-.03em}
    p{margin:12px 0 0; color:var(--muted); line-height:1.6}

    .topbar{
      position: sticky; top:0; z-index:50;
      height: var(--hdrH);
      backdrop-filter: blur(10px);
      background: rgba(7,7,8,.75);
      border-bottom: 1px solid var(--border);
    }
    .topbar-inner{
      height: var(--hdrH);
      display:flex; align-items:center; justify-content:space-between;
    }
    .brand{
      font-weight:700; letter-spacing:-.02em; font-size:16px;
      padding:10px 12px; border-radius:999px;
      transition: background .2s ease;
    }
    .brand:hover{background: rgba(255,255,255,.06)}

    .nav{
      display:none;
      gap:18px;
      align-items:center;
      color: rgba(244,244,245,.78);
      font-size:13px;
    }
    .nav button{
      appearance:none; border:none; background:transparent;
      color:inherit; cursor:pointer; padding:10px 8px; border-radius:12px;
      transition: background .2s ease, color .2s ease;
    }
    .nav button:hover{background: rgba(255,255,255,.06); color: var(--text)}
    .nav button.active{color: var(--text)}
    @media (min-width: 980px){
      .nav{display:flex}
    }

    .right{
      display:flex; gap:10px; align-items:center;
    }

    .lang{
      position:relative;
      display:flex;
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
      border-radius:999px;
      padding:3px;
      overflow:hidden;
    }
    .lang .pill{
      position:absolute;
      top:3px; bottom:3px;
      width: calc(50% - 3px);
      background:#fff;
      border-radius:999px;
      transform: translateX(0);
      transition: transform .25s cubic-bezier(.2,.9,.2,1);
    }
    .lang button{
      position:relative;
      z-index:2;
      border:none; background:transparent;
      cursor:pointer;
      font-size:12px; font-weight:700;
      padding:8px 12px;
      border-radius:999px;
      color: rgba(244,244,245,.78);
    }
    .lang button.active{color:#0a0a0b}
    .lang.de .pill{transform: translateX(100%)}

    .cta{
      border:1px solid rgba(255,255,255,.14);
      background:#fff;
      color:#0a0a0b;
      font-weight:700;
      font-size:13px;
      padding:11px 14px;
      border-radius: 999px;
      cursor:pointer;
      transition: transform .18s ease, opacity .18s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      white-space:nowrap;
    }
    .cta:hover{transform: scale(1.02)}
    .ghost{
      border:1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.03);
      color: var(--text);
      font-weight:700;
      font-size:13px;
      padding:11px 14px;
      border-radius: 999px;
      cursor:pointer;
      transition: background .18s ease, transform .18s ease;
      white-space:nowrap;
    }
    .ghost:hover{background: rgba(255,255,255,.06); transform: translateY(-1px)}

    .hero{
      padding: 78px 0 58px;
    }
    .hero-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: start;
    }
    @media (min-width: 980px){
      .hero-grid{
        grid-template-columns: 1.05fr .95fr;
        gap: 26px;
        align-items: center;
      }
      .hero{padding: 98px 0 72px;}
    }

    .badge{
      display:inline-flex;
      padding: 7px 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.03);
      border-radius: 999px;
      color: rgba(244,244,245,.78);
      font-size: 12px;
      font-weight: 600;
    }

    .btn-row{display:flex; gap:10px; flex-wrap:wrap; margin-top: 18px}
    .stats{
      margin-top: 16px;
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 10px;
      max-width: 520px;
    }
    @media (min-width: 560px){
      .stats{grid-template-columns: repeat(4, minmax(0,1fr))}
    }
    .stat{
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      border-radius: 18px;
      padding: 12px;
      transition: transform .18s ease, border-color .18s ease;
    }
    .stat:hover{transform: translateY(-2px); border-color: rgba(255,255,255,.18)}
    .stat .v{font-weight:800; color:#fff}
    .stat .l{margin-top:2px; font-size:12px; color: rgba(244,244,245,.65)}

    .panel{
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      border-radius: var(--radius2);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .preview{
      position: relative;
      border: 1px solid var(--border);
      background: radial-gradient(600px 300px at 60% -20%, rgba(255,255,255,.12), transparent 55%),
                  radial-gradient(600px 300px at 0% 100%, rgba(255,255,255,.08), transparent 55%),
                  #070708;
      border-radius: var(--radius);
      overflow:hidden;
      aspect-ratio: 4/3;
      transform: translate3d(0,0,0) scale(1.02);
      will-change: transform;
    }
    .preview::after{
      content:"";
      position:absolute; inset:0;
      background: linear-gradient(to bottom, rgba(255,255,255,.05), rgba(0,0,0,.45));
      pointer-events:none;
      opacity:.9;
    }
    .preview-inner{
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding: 18px;
    }
    .preview-title{font-size:13px; font-weight:700; color: rgba(244,244,245,.9)}
    .preview-sub{margin-top:8px; font-size:12px; color: rgba(244,244,245,.55)}
    .motion-btn{
      margin-top: 12px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.05);
      color: rgba(244,244,245,.9);
      font-size: 12px;
      font-weight: 700;
      padding: 9px 12px;
      border-radius: 999px;
      cursor:pointer;
      transition: background .18s ease, transform .18s ease;
    }
    .motion-btn:hover{background: rgba(255,255,255,.08); transform: translateY(-1px)}

    .grid4{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 18px;
    }
    @media (min-width: 760px){
      .grid4{grid-template-columns: repeat(2, minmax(0,1fr))}
    }
    @media (min-width: 1060px){
      .grid4{grid-template-columns: repeat(4, minmax(0,1fr))}
    }

    .card{
      border:1px solid var(--border);
      background: rgba(255,255,255,.02);
      border-radius: var(--radius);
      padding: 18px;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .card:hover{
      transform: translateY(-4px);
      border-color: rgba(255,255,255,.20);
      background: rgba(255,255,255,.03);
    }
    .card h3{margin:0; font-size:14px; font-weight:800}
    .card p{margin-top:8px; font-size:13px; color: rgba(244,244,245,.62); line-height:1.55}

    .why-wrap{
      display:grid;
      grid-template-columns: 1fr;
      gap: 16px;
      align-items:start;
      margin-top: 18px;
    }
    @media (min-width: 980px){
      .why-wrap{grid-template-columns: .95fr 1.05fr; gap: 22px;}
    }
    .demo{
      margin-top: 14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      border-radius: var(--radius2);
      padding: 16px;
    }
    .demo .t{font-size:13px; font-weight:800}
    .demo .d{font-size:13px; color: rgba(244,244,245,.62); margin-top:6px}
    .demo a{
      display:inline-flex;
      margin-top: 10px;
      align-items:center;
      justify-content:center;
      padding: 10px 14px;
      border-radius: 999px;
      background:#fff;
      color:#0a0a0b;
      font-size:13px;
      font-weight:800;
      transition: transform .18s ease, opacity .18s ease;
    }
    .demo a:hover{transform: translateY(-1px); opacity:.95}

    .industries{
      margin-top: 18px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 720px){
      .industries{grid-template-columns: repeat(2, minmax(0,1fr))}
    }
    @media (min-width: 980px){
      .industries{grid-template-columns: repeat(3, minmax(0,1fr))}
    }
    .chip{
      display:flex;
      gap: 12px;
      align-items:flex-start;
      border:1px solid var(--border);
      background: rgba(255,255,255,.02);
      border-radius: var(--radius2);
      padding: 14px 14px;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .chip:hover{transform: translateY(-3px); border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.03)}
    .ico{
      width: 38px; height: 38px;
      border-radius: 16px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid var(--border);
      background: rgba(0,0,0,.35);
      flex: 0 0 auto;
    }
    .chip .txt{font-size:13px; font-weight:700; color: rgba(244,244,245,.92); line-height:1.35; padding-top: 2px}
    svg{display:block}

    .impact-grid{
      margin-top: 18px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 820px){
      .impact-grid{grid-template-columns: repeat(2, minmax(0,1fr))}
    }
    .impact{
      border:1px solid var(--border);
      background: rgba(0,0,0,.35);
      border-radius: var(--radius2);
      padding: 18px;
      transition: transform .18s ease, border-color .18s ease;
    }
    .impact:hover{transform: translateY(-3px); border-color: rgba(255,255,255,.18)}
    .impact .pct{font-size:44px; font-weight:900; letter-spacing:-.03em}
    .impact .lbl{margin-top:6px; font-size:13px; color: rgba(244,244,245,.70); line-height:1.5}
    .note{margin-top: 10px; font-size:12px; color: rgba(244,244,245,.48)}

    .pricing{
      margin-top: 18px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 980px){
      .pricing{grid-template-columns: repeat(3, minmax(0,1fr))}
    }
    .plan{
      border:1px solid var(--border);
      background: rgba(0,0,0,.35);
      border-radius: 28px;
      padding: 18px;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }
    .plan:hover{transform: translateY(-6px); border-color: rgba(255,255,255,.20)}
    .plan.highlight{
      background:#fff;
      color:#0a0a0b;
      border-color: rgba(255,255,255,.30);
    }
    .plan .name{font-size:13px; font-weight:800; opacity:.85}
    .plan .price{margin-top:6px; font-size:34px; font-weight:900; letter-spacing:-.03em}
    .plan ul{margin: 14px 0 0; padding:0; list-style:none}
    .plan li{font-size:13px; margin-top: 8px; color: rgba(244,244,245,.72)}
    .plan.highlight li{color: rgba(10,10,11,.72)}
    .plan li::before{content:"•"; margin-right:8px; opacity:.75}
    .plan .plan-cta{
      margin-top: 16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 900;
      border:1px solid rgba(255,255,255,.16);
      background:#fff;
      color:#0a0a0b;
      cursor:pointer;
      transition: transform .18s ease, opacity .18s ease, background .18s ease;
    }
    .plan.highlight .plan-cta{
      background:#0a0a0b;
      color:#fff;
      border-color: rgba(0,0,0,.20);
    }
    .plan .plan-cta:hover{transform: translateY(-1px); opacity:.95}
    .fine{margin-top: 12px; font-size:12px; color: rgba(244,244,245,.52)}

    details{
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      border-radius: 18px;
      padding: 14px 14px;
      transition: border-color .18s ease, background .18s ease;
    }
    details:hover{border-color: rgba(255,255,255,.18); background: rgba(255,255,255,.04)}
    summary{
      list-style:none;
      cursor:pointer;
      font-weight: 800;
      font-size: 13px;
      color: rgba(244,244,245,.92);
      outline:none;
    }
    summary::-webkit-details-marker{display:none}
    details p{margin-top:10px; font-size:13px; color: rgba(244,244,245,.62)}

    .contact-grid{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 18px;
    }
    @media (min-width: 980px){
      .contact-grid{grid-template-columns: 1fr 1fr}
    }
    .box{
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      border-radius: 28px;
      padding: 18px;
    }
    label{display:block; font-size:12px; font-weight:800; margin:0 0 6px}
    input, textarea{
      width:100%;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.35);
      color: var(--text);
      border-radius: 14px;
      padding: 10px 12px;
      outline:none;
      font-size: 13px;
      transition: border-color .18s ease, background .18s ease;
    }
    input:focus, textarea:focus{border-color: rgba(255,255,255,.22); background: rgba(0,0,0,.45)}
    .send{
      margin-top: 12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 12px 16px;
      border-radius: 999px;
      background:#fff;
      color:#0a0a0b;
      font-weight: 900;
      font-size: 13px;
      cursor:pointer;
      border:1px solid rgba(255,255,255,.14);
      transition: transform .18s ease, opacity .18s ease;
    }
    .send:hover{transform: translateY(-1px); opacity:.95}
    .footer{
      border-top:1px solid var(--border);
      padding: 28px 0;
      text-align:center;
      color: rgba(244,244,245,.50);
      font-size: 12px;
    }

    @media (prefers-reduced-motion: reduce){
      *{scroll-behavior:auto !important}
      .preview, .card, .chip, .impact, .plan, .stat{transition:none !important}
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a class="brand" href="#top" id="brand">Helios.Virtual</a>

      <nav class="nav" aria-label="Primary">
        <button data-scroll="services" data-nav="services"></button>
        <button data-scroll="industries" data-nav="industries"></button>
        <button data-scroll="pricing" data-nav="pricing"></button>
        <button data-scroll="faq" data-nav="faq"></button>
        <button data-scroll="contact" data-nav="contact"></button>
      </nav>

      <div class="right">
        <div class="lang" id="langSwitch" role="group" aria-label="Language switch">
          <div class="pill"></div>
          <button type="button" data-lang="EN" class="active">EN</button>
          <button type="button" data-lang="DE">DE</button>
        </div>

        <button class="cta" type="button" data-scroll="contact" id="ctaTop"></button>
      </div>
    </div>
  </header>

  <main>
    <section id="top" class="hero">
      <div class="container hero-grid">
        <div>
          <div class="badge" id="heroBadge"></div>
          <h1 id="heroTitle"></h1>
          <p id="heroText"></p>

          <div class="btn-row">
            <button class="cta" type="button" data-scroll="contact" id="ctaHero"></button>
            <button class="ghost" type="button" data-scroll="pricing" id="btnPackages"></button>
          </div>

          <div class="stats" id="stats"></div>
        </div>

        <div class="panel">
          <div class="preview" id="preview" aria-label="Interactive hero preview">
            <div class="preview-inner">
              <div>
                <div class="preview-title">Matterport Tour Preview</div>
                <div class="preview-sub" id="previewSub">Tilt your phone slightly for a subtle parallax.</div>
                <button class="motion-btn" type="button" id="motionBtn" style="display:none;">Tap to enable motion</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="services" class="section alt">
      <div class="container">
        <h2 id="servicesTitle"></h2>
        <p id="servicesText"></p>
        <div class="grid4" id="servicesGrid"></div>
      </div>
    </section>

    <section id="why" class="section">
      <div class="container">
        <div class="why-wrap">
          <div>
            <h2 id="whyTitle"></h2>
            <p id="whyText"></p>

            <div class="demo">
              <div class="t" id="samplesTitle"></div>
              <div class="d" id="samplesText"></div>
              <a id="samplesBtn" href="#" target="_blank" rel="noreferrer"></a>
            </div>
          </div>

          <div class="grid4" id="whyGrid"></div>
        </div>
      </div>
    </section>

    <section id="industries" class="section">
      <div class="container">
        <h2 id="industriesTitle"></h2>
        <p id="industriesText"></p>
        <div class="industries" id="industriesGrid"></div>
      </div>
    </section>

    <section id="impact" class="section alt">
      <div class="container">
        <div class="kicker" id="impactKicker"></div>
        <h2 id="impactTitle"></h2>
        <p id="impactText"></p>

        <div class="impact-grid" id="impactGrid"></div>
        <div class="note" id="impactNote"></div>

        <div style="margin-top:14px">
          <button class="cta" type="button" data-scroll="contact" id="ctaImpact"></button>
        </div>
      </div>
    </section>

    <section id="pricing" class="section alt">
      <div class="container">
        <h2 id="packagesTitle"></h2>
        <p id="packagesText"></p>

        <div class="pricing" id="pricingGrid"></div>
        <div class="fine" id="largerText"></div>
      </div>
    </section>

    <section id="faq" class="section">
      <div class="container" style="max-width:880px">
        <h2 id="faqTitle"></h2>
        <div style="margin-top:14px; display:flex; flex-direction:column; gap:10px" id="faqGrid"></div>
      </div>
    </section>

    <section id="contact" class="section">
      <div class="container">
        <h2 id="contactTitle"></h2>
        <p id="contactText"></p>

        <div class="contact-grid">
          <div class="box">
            <div style="font-weight:900; font-size:13px" id="contactBoxTitle">Contact</div>
            <div style="margin-top:10px; color:rgba(244,244,245,.70); font-size:13px; line-height:1.6" id="contactBoxText">
              <div><strong>E-mail:</strong> hello@helios-virtual.de</div>
              <div><strong>Phone / WhatsApp:</strong> +49 (to be added)</div>
              <div><strong>Base:</strong> Hamburg, Germany</div>
            </div>
          </div>

          <form class="box" onsubmit="return false;">
            <div style="display:grid; grid-template-columns:1fr; gap:10px" id="formGrid"></div>
            <button class="send" type="button" id="sendBtn"></button>
            <div class="fine" id="formNote"></div>
          </form>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span id="footerText"></span>
    </footer>
  </main>

  <script>
    const ICONS = {
      realestate: () => `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M3 10.5 12 3l9 7.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 9.5V21h14V9.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M10 21v-6h4v6" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>`,
      commercial: () => `
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M4 21V4h16v17" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 8h2M8 12h2M8 16h2M14 8h2M14 12h2M14 16h2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>
        </svg>`,
      hospitality: () => `

    function bindActiveSection(){
      const ids = ["top","services","why","industries","impact","pricing","faq","contact"];
      const byId = {};
      ids.forEach(id => byId[id] = document.querySelector(`[data-nav="${id === "pricing" ? "pricing" : id}"]`));

      const obs = new IntersectionObserver((entries) => {
        entries.forEach(en => {
          if(!en.isIntersecting) return;
          const id = en.target.id;
          document.querySelectorAll("[data-nav]").forEach(b => b.classList.remove("active"));
          const key =
            id === "pricing" ? "pricing" :
            id === "services" ? "services" :
            id === "industries" ? "industries" :
            id === "faq" ? "faq" :
            id === "contact" ? "contact" :
            null;
          if(key){
            const btn = document.querySelector(`[data-nav="${key}"]`);
            if(btn) btn.classList.add("active");
          }
        });
      }, { rootMargin: "-40% 0px -50% 0px", threshold: 0.01 });

      ids.forEach(id => {
        const el = document.getElementById(id);
        if(el) obs.observe(el);
      });
    }

    // ---- Motion / Tilt for hero preview ----
    const previewEl = () => document.getElementById("preview");
    let motionEnabled = false;
    let prefersReduced = false;

    function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

    function setTilt(x, y){
      const elp = previewEl();
      if(!elp) return;
      const tx = clamp(x, -1, 1) * 10;
      const ty = clamp(y, -1, 1) * 10;
      elp.style.transform = `translate3d(${tx}px, ${ty}px, 0) scale(1.02)`;
    }

    function bindMouseTilt(){
      window.addEventListener("mousemove", (e) => {
        if(prefersReduced) return;
        if(motionEnabled) return;
        const nx = (e.clientX / window.innerWidth - 0.5) * 2;
        const ny = (e.clientY / window.innerHeight - 0.5) * 2;
        setTilt(nx, ny);
      }, { passive:true });
    }

    function bindDeviceTilt(){
      window.addEventListener("deviceorientation", (ev) => {
        if(prefersReduced) return;
        if(!motionEnabled) return;
        const g = typeof ev.gamma === "number" ? ev.gamma : 0; // left/right
        const b = typeof ev.beta === "number" ? ev.beta : 0;  // front/back
        const x = g / 20;
        const y = b / 25;
        setTilt(x, y);
      }, { passive:true });
    }

    async function requestDeviceMotion(){
      if(prefersReduced) return;
      const btn = document.getElementById("motionBtn");

      // iOS needs explicit permission
      if(typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function"){
        try{
          const res = await DeviceOrientationEvent.requestPermission();
          if(res === "granted"){
            motionEnabled = true;
            if(btn) btn.style.display = "none";
          }
        }catch(_e){}
      }else{
        motionEnabled = true;
        if(btn) btn.style.display = "none";
      }
    }

    function setupMotion(){
      prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const btn = document.getElementById("motionBtn");
      const sub = document.getElementById("previewSub");

      // Show permission button only on iOS-like behavior
      const needsPermission = (typeof DeviceOrientationEvent !== "undefined" && typeof DeviceOrientationEvent.requestPermission === "function");

      if(prefersReduced){
        if(sub) sub.textContent = lang === "DE" ? "Bewegung deaktiviert (reduced motion)." : "Motion disabled (reduced motion).";
        if(btn) btn.style.display = "none";
        return;
      }

      if(needsPermission){
        if(btn) btn.style.display = "inline-flex";
        if(sub) sub.textContent = lang === "DE"
          ? "Tippen Sie, um die Bewegung zu aktivieren (iPhone)."
          : "Tap to enable motion (iPhone).";
        btn.addEventListener("click", requestDeviceMotion);
      }else{
        motionEnabled = true;
        if(btn) btn.style.display = "none";
      }
    }

    // init
    render();
    bindScrollButtons();
    bindLang();
    bindActiveSection();
    bindMouseTilt();
    bindDeviceTilt();
    setupMotion();
  </script>
</body>
</html>
